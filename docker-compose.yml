services:
  app:
    build:
      context: .
      args:
        VITE_MODEL_CDN_BASE_URL: ${VITE_MODEL_CDN_BASE_URL:-}
        VITE_UMAMI_SCRIPT_URL: ${VITE_UMAMI_SCRIPT_URL:-}
        VITE_UMAMI_WEBSITE_ID: ${VITE_UMAMI_WEBSITE_ID:-}
        VITE_CF_BEACON_TOKEN: ${VITE_CF_BEACON_TOKEN:-}
    # Must match .github/workflows/ci.yml's GHCR publish target so the VPS
    # deploy job's `docker compose pull` retrieves the image built by CI.
    image: ghcr.io/avatarsik6699/cutbgart:latest
    restart: unless-stopped
    init: true # tini as PID 1 — correct signal handling, no zombie processes (SPEC.md §8.1)
    environment:
      NODE_ENV: production
      PORT: "3000"
    expose:
      - "3000"
    # Network-native way to confirm the app is actually serving, without
    # depending on nginx/TLS (which only work post deploy/init-letsencrypt.sh
    # on the real VPS) or publishing port 3000 to the host. Uses Node's
    # built-in fetch — no extra tooling needed inside the image.
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # Self-hosted Umami (custom event tracking, SPEC.md §7.6) + its own Postgres
  # instance. `umami-db`'s healthcheck gates `umami`'s startup so it never
  # boots against a not-yet-ready database.
  umami-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - umami-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami -d umami"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  umami:
    image: docker.umami.is/umami-software/umami:postgresql-latest
    restart: unless-stopped
    environment:
      DATABASE_URL: ${UMAMI_DATABASE_URL}
      APP_SECRET: ${UMAMI_APP_SECRET}
    depends_on:
      umami-db:
        condition: service_healthy
    expose:
      - "3000"

  # Self-hosted uptime monitoring (SPEC.md §7.6): pings the home page + this
  # stack's own `umami` container on `/api/heartbeat` every 5 min, alerts via
  # Telegram/email. Monitors and alert channels are configured once through
  # its own web UI after first deploy — Uptime Kuma has no compose/env-based
  # monitor config. Bound to loopback only; reach it via an SSH tunnel
  # (`ssh -L 3001:localhost:3001 <host>`) rather than exposing it publicly.
  uptime-kuma:
    image: louislam/uptime-kuma:1
    restart: unless-stopped
    volumes:
      - uptime-kuma-data:/app/data
    ports:
      - "127.0.0.1:3001:3001"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/app.conf:/etc/nginx/conf.d/app.conf:ro
      - certbot-webroot:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro

  # TLS via Certbot + webroot (SPEC.md §8.2 — chosen over nginx-proxy +
  # acme-companion for this single-app deploy: fewer moving parts).
  #
  # First deploy on a new host: nginx's config unconditionally references
  # /etc/letsencrypt/live/cutbg.art/*.pem, which doesn't exist until a
  # certificate has been issued — nginx won't even start to serve the
  # ACME challenge Certbot needs. Run ./deploy/init-letsencrypt.sh once to
  # break that bootstrap loop (dummy cert -> start nginx -> real cert ->
  # reload). After that, this service only handles ongoing renewal (checks
  # twice daily, renews when within Let's Encrypt's 30-day window).
  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    volumes:
      - certbot-webroot:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    entrypoint: >
      /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w
      /var/www/certbot --quiet; sleep 12h & wait $${!}; done"

volumes:
  certbot-webroot:
  certbot-certs:
  umami-db-data:
  uptime-kuma-data:
