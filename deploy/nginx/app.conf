# Reverse proxy to the app container's Nitro server (SPEC.md §6).
# TLS termination + ACME HTTP-01 challenge for Certbot (SPEC.md §8.2/§8.4).

gzip on;
gzip_types text/plain text/css application/json application/javascript text/xml application/xml
  application/xml+rss text/javascript image/svg+xml;
gzip_min_length 1024;
# Brotli is not enabled: stock nginx:alpine has no brotli module built in.
# Gzip covers the same SSR text-compression requirement for now; revisit
# with a brotli-enabled image (e.g. nginx-module-brotli) if needed later.

server {
    listen 80;
    server_name cutbg.art www.cutbg.art;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name cutbg.art www.cutbg.art;

    ssl_certificate     /etc/letsencrypt/live/cutbg.art/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cutbg.art/privkey.pem;

    # Umami's public tracker script + event-collection endpoint (SPEC.md §7.6),
    # proxied on this same domain so the self-hosted `umami` container never
    # needs its own public DNS/cert.
    location = /script.js {
        proxy_pass http://umami:3000/script.js;
        proxy_set_header Host $host;
    }

    location = /api/send {
        proxy_pass http://umami:3000/api/send;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
