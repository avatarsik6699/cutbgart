# Reverse proxy to the app container's Nitro server (SPEC.md §6).
# TLS termination + ACME HTTP-01 challenge for Certbot (SPEC.md §8.2/§8.4).

gzip on;
gzip_types text/plain text/css application/json application/javascript text/xml application/xml
  application/xml+rss text/javascript image/svg+xml;
gzip_min_length 1024;
server_tokens off;
limit_req_status 429;
limit_req_zone $binary_remote_addr zone=public_ssr_per_ip:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=analytics_per_ip:10m rate=2r/s;
# Brotli is not enabled: stock nginx:alpine has no brotli module built in.
# Gzip covers the same SSR text-compression requirement for now; revisit
# with a brotli-enabled image (e.g. nginx-module-brotli) if needed later.

server {
    listen 80;
    server_name cutbg.art www.cutbg.art cdn.cutbg.art;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Static model/WASM origin behind the proxied cdn.cutbg.art Cloudflare record
# (Phase 14). Nginx handles single-range requests for static files natively.
server {
    listen 443 ssl;
    http2 on;
    server_name cdn.cutbg.art;

    ssl_certificate     /etc/letsencrypt/live/cutbg.art/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cutbg.art/privkey.pem;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location /models/ {
        alias /srv/model-assets/;
        autoindex off;

        # nginx:alpine's bundled mime.types does not recognize ORT's `.mjs`
        # loader, and browsers reject an ES module served as octet-stream.
        types {
            application/javascript js mjs;
            application/json json;
            application/wasm wasm;
        }

        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Expose-Headers "Accept-Ranges, Content-Length, Content-Range" always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Cross-Origin-Resource-Policy "cross-origin" always;

        limit_except GET HEAD { deny all; }
    }

    location / {
        return 404;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name cutbg.art www.cutbg.art;

    ssl_certificate     /etc/letsencrypt/live/cutbg.art/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cutbg.art/privkey.pem;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Umami's public tracker script + event-collection endpoint (SPEC.md §7.6),
    # proxied on this same domain so the self-hosted `umami` container never
    # needs its own public DNS/cert.
    location = /script.js {
        limit_req zone=public_ssr_per_ip burst=20 nodelay;
        proxy_pass http://umami:3000/script.js;
        proxy_set_header Host $host;
        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
    }

    location = /api/send {
        client_max_body_size 64k;
        limit_req zone=analytics_per_ip burst=10 nodelay;
        proxy_pass http://umami:3000/api/send;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
    }

    location / {
        client_max_body_size 32k;
        limit_req zone=public_ssr_per_ip burst=30 nodelay;
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
}
