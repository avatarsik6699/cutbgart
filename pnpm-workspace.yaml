allowBuilds:
  esbuild: true
  onnxruntime-node: true
  protobufjs: true
  sharp: true
# `minimumReleaseAge` (pnpm's supply-chain freshness gate) rejects lockfile
# entries for packages published too recently. Our lockfile is already the
# trust boundary — `pnpm install --frozen-lockfile` only ever installs
# exact versions committed and reviewed here, so the extra freshness check
# just breaks Docker builds run shortly after `pnpm add`. See
# docs/KNOWN_GOTCHAS.md.
minimumReleaseAge: 0
overrides:
  "@hono/node-server": 2.0.10
  adm-zip: 0.6.0
  fast-uri: 3.1.4
  sharp: 0.35.3
